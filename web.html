<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiX Notebook Web</title>
  </head>
  <body>
    <main class="app-shell web-app-shell">
      <header class="toolbar">
        <div class="toolbar-title-group"><div><p class="eyebrow">RiX Notebook Web</p><h1 id="workspace-title">Untitled Markdown</h1></div></div>
        <div class="toolbar-actions">
          <p id="document-status" class="document-status" aria-live="polite">In browser memory</p>
          <button id="open-markdown" type="button">Open Markdown</button>
          <button id="download-markdown" type="button">Download</button>
          <button id="recent-notebooks" type="button">Recent</button>
          <button id="toggle-right-pane" type="button">Show preview</button>
          <button id="run-notebook" type="button">Run</button>
        </div>
      </header>
      <section class="web-persistence-notice">
        <label><input id="keep-local-copy" type="checkbox" /> Keep a local recovery copy in this browser</label>
        <span>This is opt-in browser storage, not cloud storage. Browser data may be cleared or lost.</span>
      </section>
      <section class="workspace" aria-label="RiX Markdown workspace">
        <section class="pane editor-pane" aria-label="Markdown editor"><div class="editor-heading"><span class="pane-title">Markdown</span></div><div id="markdown-editor"></div></section>
        <section class="document-pane" aria-label="Rendered notebook">
          <section id="slider-controls" class="slider-controls" aria-label="RiX controls" hidden><p class="slider-controls-title">Controls</p><div id="slider-control-list"></div></section>
          <article id="preview-pane" class="pane preview-pane" aria-label="Rendered Markdown preview" hidden><div class="preview-heading"><span class="pane-title">Preview</span></div><div id="markdown-preview" class="markdown-body"></div></article>
          <aside id="output-pane" class="output-pane" aria-label="RiX cell results"><span class="pane-title">RiX results</span><div id="rix-output" class="rix-output"></div></aside>
        </section>
      </section>
    </main>
    <input id="markdown-file" type="file" accept=".md,.markdown,text/markdown,text/plain" hidden />
    <dialog id="recent-dialog" class="app-dialog"><div class="help-header"><div><p class="eyebrow">This browser</p><h2>Recent local copies</h2></div><button id="close-recent" class="secondary-button" type="button">Close</button></div><p class="dialog-hint">Only files you explicitly opted to keep are listed here.</p><div id="recent-list" class="recent-list"></div></dialog>
    <script type="module" src="/src/browser/main.js"></script>
  </body>
</html>
